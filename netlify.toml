[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "http://www.miflujotvplus.com/*"
  to = "https://miflujotvplus.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.miflujotvplus.com/*"
  to = "https://miflujotvplus.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://miflujotvplus.com/*"
  to = "https://miflujotvplus.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
